name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show environment
        run: |
          node -v
          npm -v
          echo "Repo root:"
          ls -la
          echo "data directory:"
          ls -la data || true

      - name: Ensure lockfile exists (needed by npm ci)
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error file=package-lock.json::package-lock.json is missing. Run 'npm install' locally, commit the lockfile, and push."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Show data files
        run: |
          echo "Schema head:"
          head -n 20 data/products.schema.json || true
          echo "Products head:"
          head -n 20 data/products.json || true

      - name: Validate product data (JSON Schema 2020-12)
        run: npx -y ajv-cli@5 -c ajv2020 validate -s data/products.schema.json -d data/products.json

      - name: Build (Astro)
        run: npm run build
