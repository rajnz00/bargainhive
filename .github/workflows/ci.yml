name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate product data (JSON Schema 2020-12)
        run: npx -y ajv-cli@5 validate -c .github/ajv.config.mjs -s data/products.schema.json -d data/products.json --errors=text --strict=false

      # ✅ Validate with JSON Schema 2020-12 (using explicit Ajv config)
      - name: Validate product data (JSON Schema 2020-12)
        run: npx -y ajv-cli@5 validate -c .github/ajv.config.cjs -s data/products.schema.json -d data/products.json --errors=text --strict=false
